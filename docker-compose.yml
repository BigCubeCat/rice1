version: "3.8"

services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crack-hash-worker
    ports:
      - "8080:8080"
    environment:
      - TZ=Europe/Moscow
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8080/crack",
          "-X",
          "POST",
          "-H",
          "Content-Type: application/xml",
          "-d",
          "<test/>",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 3 # Количество воркеров для масштабирования
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

